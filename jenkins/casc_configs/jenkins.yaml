# ==========================================
# 文件名：jenkins/casc_configs/jenkins.yaml
# 用途：Jenkins 系统级配置（邮件服务器、时区等）
# ==========================================

jenkins:
  systemMessage: "API 自动化测试 CI/CD 平台（国内优化版）"
  
  # 国内插件更新源
  updateCenter:
    sites:
      - id: default
        url: https://mirrors.cloud.tencent.com/jenkins/updates/update-center.json 
  
  # 时区设置
  globalNodeProperties:
    - envVars:
        env:
          - key: TZ
            value: Asia/Shanghai

# ==========================================
# 非核心系统配置（必须放在 unclassified 下）
# ==========================================
unclassified:
  # 基础邮件配置（Mailer 插件）
  mailer:
    smtpHost: smtp.qq.com
    smtpPort: "465"              # 注意：必须是字符串
    useSsl: true
    charset: "UTF-8"
    defaultSuffix: "@qq.com"
    replyToAddress: "1653195118@qq.com"
    authentication:
      username: ${EMAIL_USER}
      password: ${EMAIL_PASSWORD}

  # 扩展邮件配置（Email Extension 插件）
  # 注意：JCasC 中键名是 email-ext，不是 extendedEmail
  email-ext:
    smtpServer: smtp.qq.com
    smtpPort: "465"
    useSsl: true
    defaultContentType: text/html
    defaultSubject: "构建通知: $PROJECT_NAME - Build # $BUILD_NUMBER - $BUILD_STATUS!"
    defaultBody: |
      <h3>构建结果: ${BUILD_STATUS}</h3>
      <p>项目: ${PROJECT_NAME}</p>
      <p>构建号: ${BUILD_NUMBER}</p>
      <p>Allure 报告: <a href="${BUILD_URL}allure/">点击查看</a></p>
      <p>控制台日志: <a href="${BUILD_URL}console">点击查看</a></p>

# ==========================================
# 凭证配置（根级别）
# ==========================================
credentials:
  system:
    domainCredentials:
      - usernamePassword:        # 注意：直接是凭证项，不需要 - credentials: 这一层
          scope: GLOBAL
          id: gitee-credentials
          username: ${GITEE_USER}
          password: ${GITEE_PASS}
          description: Gitee 代码仓库凭证
      - string:
          scope: GLOBAL
          id: dingding-token
          secret: ${DINGDING_TOKEN}
          description: 钉钉机器人 Token
